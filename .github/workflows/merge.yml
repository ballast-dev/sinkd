name: merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - release/*

permissions:
  contents: write

jobs:
  merge-bump:
    if: github.event.pull_request.merged
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.BALLAST_DEV_BOT_CLIENT_ID }}
          private-key: ${{ secrets.BALLAST_DEV_BOT_PRIVATE_KEY }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: launchfirestorm/bump@v6

      - name: "select bump strategy"
        shell: bash
        run: |
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" == release/* ]]; then
            echo "bump_mode=release" >> "$GITHUB_ENV"
            echo "push_ref=HEAD" >> "$GITHUB_ENV"
          elif [[ "${{ github.base_ref }}" == main ]]; then
            echo "bump_mode=patch" >> "$GITHUB_ENV"
            echo "push_ref=main" >> "$GITHUB_ENV"
          else
            echo "bump_mode=candidate" >> "$GITHUB_ENV"
            echo "push_ref=HEAD" >> "$GITHUB_ENV"
          fi

      - name: "bump version, and update Cargo.toml/Cargo.lock"
        shell: bash
        run: |
          bump --${{ env.bump_mode }}
          bump update Cargo.toml
          cargo update -p sinkd

      - name: "commit, tag, and push"
        shell: bash
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add -u
          git commit -m "chore: bump sinkd to $(bump --print)"
          bump tag
          git push origin ${{ env.push_ref }} --tags