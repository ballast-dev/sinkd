name: ci

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - name: Clippy and tests
        run: |
          cargo clippy --all-targets --all-features
          cargo test --workspace

  build-linux:
    needs: lint
    strategy:
      matrix:
        include:
          - { runner: ubuntu-22.04, target: x86_64-unknown-linux-musl, platform: linux-amd64 }
          - { runner: ubuntu-22.04-arm, target: aarch64-unknown-linux-musl, platform: linux-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: musl toolchain (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build ${{ matrix.target }}
        run: |
          mkdir -p artifacts
          cargo build -p sinkd --release --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/sinkd" "artifacts/sinkd-${{ matrix.platform }}"

      - uses: actions/upload-artifact@v5
        with:
          name: sinkd-${{ matrix.platform }}
          path: artifacts/sinkd-*
          retention-days: 7

  build-macos:
    needs: lint
    strategy:
      matrix:
        include:
          - { runner: macos-15-intel, target: x86_64-apple-darwin, platform: darwin-amd64 }
          - { runner: macos-latest, target: aarch64-apple-darwin, platform: darwin-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build ${{ matrix.target }}
        run: |
          mkdir -p artifacts
          cargo build -p sinkd --release --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/sinkd" "artifacts/sinkd-${{ matrix.platform }}"
      - uses: actions/upload-artifact@v5
        with:
          name: sinkd-${{ matrix.platform }}
          path: artifacts/sinkd-*
          retention-days: 7

  build-windows:
    needs: lint
    strategy:
      matrix:
        include:
          - { runner: windows-latest, target: x86_64-pc-windows-msvc, platform: windows-amd64 }
          - { runner: windows-11-arm, target: aarch64-pc-windows-msvc, platform: windows-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build ${{ matrix.target }}
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          cargo build -p sinkd --release --target ${{ matrix.target }}
          Copy-Item "target/${{ matrix.target }}/release/sinkd.exe" "artifacts/sinkd-${{ matrix.platform }}.exe"
      - uses: actions/upload-artifact@v5
        with:
          name: sinkd-${{ matrix.platform }}
          path: artifacts/sinkd-*
          retention-days: 7

  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/download-artifact@v6
        with:
          pattern: sinkd-*
          merge-multiple: true
          path: artifacts/
      - name: Version from Cargo.toml
        run: echo "version=$(cargo pkgid | cut -d# -f2)" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.version }}
          body: sinkd ${{ env.version }}
          draft: false
          prerelease: false
          files: artifacts/*
