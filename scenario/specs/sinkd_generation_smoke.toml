# Declarative harness + shell: builds sinkd, runs server/client in -d (debug) mode,
# touches a watched file, asserts `generation_state.toml` shows current_generation >= 1.
# Requires: Zenoh reachable (same host), `git`, `bash`, `cargo`, writable `/tmp/sinkd`.
name = "sinkd-generation-smoke"
timeout_ms = 180000

[[steps]]
kind = "write_file"
path = ".scenario_initialized"
content = ""

[[steps]]
kind = "run_command"
command = "bash scenario/scripts/sinkd_generation_smoke.sh '{{root}}'"
