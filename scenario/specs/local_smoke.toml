name = "local-smoke"
timeout_ms = 5000

[[steps]]
kind = "create_dir"
path = "alpha"

[[steps]]
kind = "write_file"
path = "alpha/shared_document.txt"
content = "initial line"

[[steps]]
kind = "append_file"
path = "alpha/shared_document.txt"
content = "\nsecond line"

[[steps]]
kind = "assert_exists"
path = "alpha/shared_document.txt"

[[steps]]
kind = "assert_contains"
path = "alpha/shared_document.txt"
contains = "second line"
